version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tramix-postgres
    environment:
      POSTGRES_USER: tramix_user
      POSTGRES_PASSWORD: tramix_password
      POSTGRES_DB: tramix_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
